services:
  backend:
    image: node:20-bookworm-slim
    working_dir: /app
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://infocracy:${POSTGRES_PASSWORD:-infocracy_dev_password}@postgres:5432/infocracy?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "${JWT_SECRET:-please-change-this-secret-in-production}"
      JWT_EXPIRES_IN: "${JWT_EXPIRES_IN:-7d}"
      PORT: "4000"
      NODE_ENV: "development"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:3000}"
    command:
      - sh
      - -c
      - |
        apt-get update && apt-get install -y --no-install-recommends openssl curl && rm -rf /var/lib/apt/lists/*
        if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock-ready ]; then
          npm ci && touch node_modules/.package-lock-ready;
        fi
        npx prisma generate
        npx prisma migrate deploy
        npm run dev
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    working_dir: /app
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-/api}"
      NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-http://localhost:4000}"
      BACKEND_INTERNAL_URL: "${BACKEND_INTERNAL_URL:-http://backend:4000}"
      NODE_ENV: "development"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    command:
      - sh
      - -c
      - |
        if [ ! -d node_modules ] || [ ! -f node_modules/.package-lock-ready ]; then
          npm ci && touch node_modules/.package-lock-ready;
        fi
        npm run dev -- --hostname 0.0.0.0 --port 3000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
